<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>30 Days of Flowers For You</title>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts for different daily vibes -->
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <!-- Confetti script (ready for the Day 30 finale!) -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        /* Custom Fonts */
        .font-handwriting { font-family: 'Caveat', cursive; }
        .font-elegant { font-family: 'Playfair Display', serif; }
        .font-modern { font-family: 'Poppins', sans-serif; }

        /* Smooth transitions for when the day changes */
        body { transition: background-color 1s ease; }
        .dynamic-element { transition: all 0.8s ease; }

        /* Cute animations */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .animate-float { animation: float 4s ease-in-out infinite; }
        
        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            25% { transform: scale(1.1); }
            50% { transform: scale(1); }
            75% { transform: scale(1.1); }
        }
        .animate-heartbeat { animation: heartbeat 1.5s infinite; display: inline-block; }
    </style>
</head>
<body id="app-body" class="min-h-screen flex items-center justify-center p-4 bg-gray-50 text-gray-800 font-modern">

    <!-- Main Card Container -->
    <main id="card-container" class="relative max-w-md w-full bg-white rounded-3xl p-6 md:p-8 shadow-2xl opacity-0 transform translate-y-8 transition-all duration-1000 ease-out">
        
        <!-- Day Badge -->
        <div class="absolute -top-4 -left-4 md:-left-6">
            <div id="day-badge" class="bg-black text-white rounded-full h-16 w-16 flex flex-col items-center justify-center shadow-lg transform rotate-[-10deg]">
                <span class="text-xs font-bold uppercase tracking-widest opacity-80">Day</span>
                <span id="day-number" class="text-2xl font-bold leading-none">1</span>
            </div>
        </div>

        <!-- Flower Image -->
        <div class="relative w-full aspect-square rounded-2xl overflow-hidden mb-6 shadow-inner bg-gray-100 flex items-center justify-center">
            <img id="flower-image" src="" alt="Daily Flower" class="object-cover w-full h-full animate-float" onerror="this.src='https://images.unsplash.com/photo-1601412436009-d964bd02edbc?q=80&w=600&auto=format&fit=crop';">
        </div>

        <!-- Content area -->
        <div class="text-center">
            
            <!-- Sleek Progress Indicator -->
            <div class="mb-6 px-2">
                <p id="progress-text" class="text-xs font-bold uppercase tracking-widest opacity-60 mb-3">Day 1 of 30</p>
                <!-- Bar Background -->
                <div class="h-2 w-full bg-black/5 rounded-full overflow-hidden shadow-inner">
                    <!-- Animated Fill -->
                    <div id="progress-fill" class="h-full bg-current opacity-70 rounded-full transition-all duration-1000 ease-out" style="width: 0%"></div>
                </div>
            </div>

            <h1 id="flower-name" class="text-3xl md:text-4xl font-elegant font-bold mb-2">Flower Name</h1>
            
            <div class="w-12 h-1 bg-current mx-auto mb-6 opacity-30 rounded-full"></div>
            
            <p id="love-message" class="text-lg md:text-xl leading-relaxed mb-6">
                Message goes here...
            </p>
            
            <div class="text-2xl animate-heartbeat text-current opacity-80">
                🤍
            </div>

            <!-- Daily Question -->
            <div class="mt-8 p-4 rounded-2xl bg-white/40 border border-current/20 backdrop-blur-sm shadow-sm transition-all duration-500 hover:bg-white/60">
                <p class="text-xs font-bold uppercase tracking-widest opacity-60 mb-2">Question of the day</p>
                <p id="daily-question" class="text-sm md:text-base italic font-medium opacity-90"></p>
            </div>

        </div>
        
    </main>

    <script>
        // --- 1. THE DAILY DATABASE ---
        // Every day you can change the text, image, and colors!
        const flowerData = {
            1: {
                flower: "Daisy",
                // IMPORTANT: Create an "images" folder, rename your uploaded image to "daisy.png", and put it inside!
                image: "images/daisy.png", 
                message: "Day 1: Starting simple and sweet. A little daisy to kick off our 30 days of flowers. You make every day brighter!",
                question: "What is your absolute favorite memory of us so far?",
                theme: {
                    background: "bg-[#fdfbf7]", // Creamy paper background
                    card: "bg-white shadow-[0_20px_50px_rgba(234,179,8,0.1)] border border-amber-50",
                    text: "text-amber-900",
                    badgeBg: "bg-amber-400",
                    badgeText: "text-amber-900",
                    fontMsg: "font-handwriting text-2xl" 
                }
            },
            2: {
                flower: "Tulip",
                image: "images/tulip.png",
                message: "Day 2: A beautiful tulip for a beautiful girl. Fun fact: Tulips keep growing even after they are cut, just like my love for you. (Cheesy? Maybe a little).",
                question: "What was your first impression of me?",
                theme: {
                    background: "bg-pink-50",
                    card: "bg-white shadow-[0_20px_50px_rgba(236,72,153,0.15)] border border-pink-100",
                    text: "text-fuchsia-950",
                    badgeBg: "bg-fuchsia-500 shadow-lg shadow-fuchsia-500/40", // Glowing pink badge
                    badgeText: "text-white",
                    fontMsg: "font-elegant text-xl italic" // Elegant, book-like font instead of handwriting
                }
            },
            3: {
                flower: "Lily of the Valley",
                image: "images/lilyofvalley.png",
                message: "Day 3: A delicate Lily of the Valley. They symbolize sweetness and happiness. Every little moment with you feels like a sweet, happy discovery.",
                question: "What is one small thing I do that makes you smile?",
                theme: {
                    background: "bg-gradient-to-br from-green-50 to-emerald-100", // Soft woodland green
                    card: "bg-white/80 backdrop-blur-md shadow-[0_15px_40px_rgba(16,185,129,0.15)] border border-emerald-100", // Delicate frosted card
                    text: "text-emerald-950",
                    badgeBg: "bg-emerald-500 shadow-lg shadow-emerald-500/30",
                    badgeText: "text-white",
                    fontMsg: "font-modern text-lg font-medium" // Clean and sweet
                }
            },
            4: {
                flower: "Peony",
                image: "images/peony.png",
                message: "Day 4: A gorgeous peony today! They are lush and full of life, just like the beautiful energy you bring everywhere you go.",
                question: "If we could go anywhere together tomorrow, where would you pick?",
                theme: {
                    background: "bg-gradient-to-r from-rose-100 to-teal-50", // Soft, romantic blend
                    card: "bg-white shadow-[0_10px_40px_rgba(225,29,72,0.1)] border border-rose-100 rounded-[2rem]", // Softer corners
                    text: "text-rose-900",
                    badgeBg: "bg-rose-400 shadow-md shadow-rose-400/50",
                    badgeText: "text-white",
                    fontMsg: "font-elegant text-xl" 
                }
            },
            5: {
                flower: "Forget-Me-Not",
                image: "images/forgetmenot.png",
                message: "Day 5: Little blue Forget-Me-Nots. A tiny, beautiful reminder that you are always on my mind and in my heart, no matter where we are.",
                question: "What song reminds you of me the most?",
                theme: {
                    background: "bg-gradient-to-br from-blue-50 to-indigo-100", // Soft periwinkle and blue
                    card: "bg-white/90 backdrop-blur-sm shadow-[0_15px_30px_rgba(99,102,241,0.15)] border-l-4 border-indigo-400", // Fresh left-border design
                    text: "text-indigo-950",
                    badgeBg: "bg-indigo-500 shadow-lg shadow-indigo-500/30",
                    badgeText: "text-white",
                    fontMsg: "font-handwriting text-2xl tracking-wide" // Sweet handwriting vibe
                }
            },
            6: {
                flower: "Carnation",
                image: "images/carnation.png",
                message: "Day 6: Sweet, ruffled carnations! They symbolize fascination and admiration, which is exactly how I look at you every single day.",
                question: "What is something about me that you think other people don't notice?",
                theme: {
                    background: "bg-gradient-to-tr from-orange-50 to-red-50", // Warm peachy/coral vibe
                    card: "bg-white/90 backdrop-blur-sm shadow-[0_15px_30px_rgba(234,88,12,0.15)] border-b-4 border-orange-400", // Bottom border accent
                    text: "text-orange-950",
                    badgeBg: "bg-orange-500 shadow-lg shadow-orange-500/30",
                    badgeText: "text-white",
                    fontMsg: "font-modern text-lg leading-relaxed" // Clean and modern
                }
            },
            7: {
                flower: "Orchid",
                image: "images/orchid.png",
                message: "Day 7: An elegant Orchid. They are rare, exotic, and beautifully unique—just like the connection we share. You are truly one of a kind.",
                question: "What moment made you feel closest to me?",
                theme: {
                    background: "bg-gradient-to-br from-fuchsia-50 to-purple-100", // Elegant lavender/purple
                    card: "bg-white/90 backdrop-blur-sm shadow-[0_15px_40px_rgba(168,85,247,0.15)] border border-purple-200 rounded-tr-[3rem] rounded-bl-[3rem]", // Unique opposite rounded corners
                    text: "text-purple-950",
                    badgeBg: "bg-purple-500 shadow-lg shadow-purple-500/40",
                    badgeText: "text-white",
                    fontMsg: "font-elegant text-xl leading-relaxed" // Sophisticated and smooth
                }
            },
            8: {
                flower: "Hydrangea",
                image: "images/hydrangea.png",
                message: "Day 8: Beautiful, blooming Hydrangeas! Today is International Women's Day, and I want to celebrate YOU. I am constantly in awe of your mind, your strength, and the incredible woman you are. I'm so proud to be yours.",
                question: "What is one thing you love about our conversations?",
                theme: {
                    background: "bg-gradient-to-br from-fuchsia-100 via-purple-50 to-pink-100", // Regal, empowering IWD colors
                    card: "bg-white/95 backdrop-blur-md shadow-[0_20px_60px_rgba(192,38,211,0.25)] border-2 border-fuchsia-300 rounded-[2.5rem]", // Extra special framing
                    text: "text-fuchsia-950",
                    badgeBg: "bg-fuchsia-600 shadow-xl shadow-fuchsia-500/50",
                    badgeText: "text-white",
                    fontMsg: "font-elegant text-xl font-medium leading-relaxed" 
                }
            },
            9: {
                flower: "Nargis (Daffodil)",
                image: "images/daffodil.png",
                message: "Day 9: A bright and beautiful Nargis. They are the ultimate symbol of spring and new beginnings. Just like the morning sun, you bring so much warmth, light, and hope into my life.",
                question: "When do you miss me the most?",
                theme: {
                    background: "bg-gradient-to-tr from-yellow-50 to-amber-100", // Sunny, cheerful yellow
                    card: "bg-white/90 backdrop-blur-md shadow-[0_15px_40px_rgba(251,191,36,0.15)] border-t-4 border-b-4 border-yellow-300 rounded-2xl", // Double border top and bottom
                    text: "text-amber-950",
                    badgeBg: "bg-yellow-400 shadow-lg shadow-yellow-400/40",
                    badgeText: "text-amber-950",
                    fontMsg: "font-handwriting text-2xl tracking-wide" // Handwritten style
                }
            }
            // Add Day 10 through 30 here as you go!
        };

        // --- 2. GET THE CURRENT DAY ---
        // Reads ?day=1 from the URL link you send her
        const urlParams = new URLSearchParams(window.location.search);
        let currentDay = parseInt(urlParams.get('day'));

        // Default to Day 1 if the link is broken or missing
        if (!currentDay || !flowerData[currentDay]) {
            currentDay = 1; 
        }

        const data = flowerData[currentDay];

        // --- 3. UPDATE THE WEBSITE ---
        window.addEventListener('DOMContentLoaded', () => {
            
            // Update Text
            document.getElementById('day-number').innerText = currentDay;
            document.getElementById('flower-name').innerText = data.flower;
            
            const msgElement = document.getElementById('love-message');
            msgElement.innerText = data.message;
            msgElement.className = `leading-relaxed mb-6 ${data.theme.fontMsg}`; // Apply specific font
            
            // Update Image
            document.getElementById('flower-image').src = data.image;

            // Update Progress Indicator
            document.getElementById('progress-text').innerText = `Day ${currentDay} of 30`;
            
            // Add a tiny delay so the progress bar smoothly animates from 0% when the page loads
            setTimeout(() => {
                const progressPercentage = (currentDay / 30) * 100;
                document.getElementById('progress-fill').style.width = `${progressPercentage}%`;
            }, 100);

            // Update Daily Question
            document.getElementById('daily-question').innerText = data.question || "What made you smile today?";

            // Apply Themes (Colors)
            const body = document.getElementById('app-body');
            const card = document.getElementById('card-container');
            const badge = document.getElementById('day-badge');

            // Reset old classes and apply new ones
            body.className = `min-h-screen flex items-center justify-center p-4 transition-colors duration-1000 ${data.theme.background} ${data.theme.text}`;
            card.className = `relative max-w-md w-full rounded-3xl p-6 md:p-8 transform transition-all duration-1000 ease-out translate-y-0 opacity-100 ${data.theme.card}`;
            badge.className = `absolute -top-4 -left-4 md:-left-6 rounded-full h-16 w-16 flex flex-col items-center justify-center shadow-lg transform rotate-[-10deg] ${data.theme.badgeBg} ${data.theme.badgeText}`;

            // Trigger confetti if it's Day 30, OR a special mini-burst for Women's Day!
            if (currentDay === 30) {
                setTimeout(shootConfetti, 500);
            } else if (currentDay === 8) {
                setTimeout(shootMiniConfetti, 600); // Surprise!
            }
        });

        // Mini Confetti for Women's Day
        function shootMiniConfetti() {
            confetti({
                particleCount: 150,
                spread: 80,
                origin: { y: 0.6 },
                colors: ['#c026d3', '#db2777', '#a855f7', '#ffffff'] // Purple, Pink, Fuchsia
            });
        }

        // Confetti Function for the finale
        function shootConfetti() {
            var duration = 3 * 1000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

            function randomInRange(min, max) {
                return Math.random() * (max - min) + min;
            }

            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) { return clearInterval(interval); }
                var particleCount = 50 * (timeLeft / duration);
                
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
            }, 250);
        }
    </script>
</body>
</html>
