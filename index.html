    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts for different daily vibes -->
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <!-- Confetti script (ready for the Day 30 finale!) -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        /* Custom Fonts */
        .font-handwriting { font-family: 'Caveat', cursive; }
        .font-elegant { font-family: 'Playfair Display', serif; }
        .font-modern { font-family: 'Poppins', sans-serif; }

        /* Smooth transitions for when the day changes */
        body { transition: background-color 1s ease; }
        .dynamic-element { transition: all 0.8s ease; }

        /* Cute animations */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .animate-float { animation: float 4s ease-in-out infinite; }
        
        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            25% { transform: scale(1.1); }
            50% { transform: scale(1); }
            75% { transform: scale(1.1); }
        }
        .animate-heartbeat { animation: heartbeat 1.5s infinite; display: inline-block; }
    </style>
</head>
<body id="app-body" class="min-h-screen flex items-center justify-center p-4 bg-gray-50 text-gray-800 font-modern">

        <div class="absolute -top-4 -left-4 md:-left-6">
            <div id="day-badge" class="bg-black text-white rounded-full h-16 w-16 flex flex-col items-center justify-center shadow-lg transform rotate-[-10deg]">

            </div>
        </div>

        <!-- Flower Image -->

                <!-- Bar Background -->

                </div>
            </div>

            <div class="w-12 h-1 bg-current mx-auto mb-6 opacity-30 rounded-full"></div>

                <p id="daily-question" class="text-sm md:text-base italic font-medium opacity-90"></p>
            </div>

        // --- 2. DATE-BASED DAY CALCULATOR (ADMIN CONTROLLED) ---
        // ⚠️ IMPORTANT: Set your campaign start date here! Format: "YYYY-MM-DD"
        // This is the date when Day 1 should be shown
        const CAMPAIGN_START_DATE = "2026-04-24"; // Change this to your actual start date!
        
        // Optional: Set an admin password to override and view any day (for testing)
        // Leave empty "" to disable this feature, or set to a password like "cupid123"
        const ADMIN_PASSWORD = "kami"; 

        // ✨ Calculate which day it should be TODAY (based on calendar date)
        function calculateCurrentDay() {
            const today = new Date();
            today.setHours(0, 0, 0, 0); // Reset time to midnight for accurate day calculation
            
            const startDate = new Date(CAMPAIGN_START_DATE);
            startDate.setHours(0, 0, 0, 0); // Reset time to midnight
            
            // Calculate the difference in milliseconds, then convert to days
            const timeDifference = today - startDate;
            const daysPassed = Math.floor(timeDifference / (1000 * 60 * 60 * 24));
            
            // Day 1 is on the start date, so add 1
            const calculatedDay = daysPassed + 1;
            
            return calculatedDay;
        }

        // Check if admin password is provided (for override/cheating!)
        const urlParams = new URLSearchParams(window.location.search);
        const adminAttempt = urlParams.get('admin');
        const dayFromUrl = parseInt(urlParams.get('day'));
        
        let currentDay;
        let isAdminAccess = false;

        // If admin password is set and provided, allow override FIRST (skip date calculations)
        if (ADMIN_PASSWORD && adminAttempt === ADMIN_PASSWORD && dayFromUrl && flowerData[dayFromUrl]) {
            currentDay = dayFromUrl;
            isAdminAccess = true;
        } else {
            // Otherwise, use date-based calculation
            currentDay = calculateCurrentDay();
            
            // Block access to future days (unless today hasn't arrived yet for Day 1)
            if (currentDay < 1) {
                currentDay = "coming_soon";
            } else if (currentDay > 30) {
                currentDay = 30; // Campaign ended, show final day
            }
        }

        let data = null;
        let blockedMessage = false;

        if (currentDay === "coming_soon") {
            blockedMessage = "The campaign hasn't started yet! Check back soon. 🌸";
        } else if (typeof currentDay === 'number' && !flowerData[currentDay]) {
            currentDay = 30; // Fallback to last day if somehow invalid
            data = flowerData[currentDay];
        } else {
            data = flowerData[currentDay];
        }

        // --- 3. UPDATE THE WEBSITE ---
        window.addEventListener('DOMContentLoaded', () => {
            
            // ⚠️ If access is blocked (future day requested), show locked message
            if (blockedMessage) {
                const card = document.getElementById('card-container');
                const body = document.getElementById('app-body');
                
                body.className = 'min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-rose-50 to-pink-100 text-rose-900 font-modern';
                card.innerHTML = `
                    <div class="text-center">
                        <div class="text-6xl mb-4">🔒</div>
                        <h1 class="text-3xl md:text-4xl font-elegant font-bold mb-4">Not Available Yet</h1>
                        <p class="text-lg mb-6">${blockedMessage}</p>
                        <div class="text-sm opacity-70">
                            <p>Current Date: <strong>${new Date().toLocaleDateString()}</strong></p>
                            <p>Campaign Started: <strong>${new Date(CAMPAIGN_START_DATE).toLocaleDateString()}</strong></p>
                        </div>
                    </div>
                `;
                return; // Exit early, don't load the flower
            }
            
            // Update Text
            document.getElementById('day-number').innerText = currentDay;
            document.getElementById('flower-name').innerText = data.flower;
            
            const msgElement = document.getElementById('love-message');
            msgElement.innerText = data.message;
            msgElement.className = `leading-relaxed mb-6 ${data.theme.fontMsg}`; // Apply specific font
            
            // Update Image
            document.getElementById('flower-image').src = data.image;

            // Update Progress Indicator
            document.getElementById('progress-text').innerText = `Day ${currentDay} of 30`;
            
            // Add a tiny delay so the progress bar smoothly animates from 0% when the page loads
            setTimeout(() => {
                const progressPercentage = (currentDay / 30) * 100;
                document.getElementById('progress-fill').style.width = `${progressPercentage}%`;
            }, 100);

            // Update Daily Question
            document.getElementById('daily-question').innerText = data.question || "What made you smile today?";

            // Apply Themes (Colors)
            const body = document.getElementById('app-body');
            const card = document.getElementById('card-container');
            const badge = document.getElementById('day-badge');

            // Reset old classes and apply new ones
            body.className = `min-h-screen flex items-center justify-center p-4 transition-colors duration-1000 ${data.theme.background} ${data.theme.text}`;
            card.className = `relative max-w-md w-full rounded-3xl p-6 md:p-8 transform transition-all duration-1000 ease-out translate-y-0 opacity-100 ${data.theme.card}`;
            badge.className = `absolute -top-4 -left-4 md:-left-6 rounded-full h-16 w-16 flex flex-col items-center justify-center shadow-lg transform rotate-[-10deg] ${data.theme.badgeBg} ${data.theme.badgeText}`;

            // Trigger confetti if it's Day 30, OR a special mini-burst for Women's Day!
            if (currentDay === 30) {
                setTimeout(shootConfetti, 500);
            } else if (currentDay === 8) {
                setTimeout(shootMiniConfetti, 600); // Surprise!
            }
        });

        // Mini Confetti for Women's Day
        function shootMiniConfetti() {
            confetti({
                particleCount: 150,
                spread: 80,
                origin: { y: 0.6 },
                colors: ['#c026d3', '#db2777', '#a855f7', '#ffffff'] // Purple, Pink, Fuchsia
            });
        }

        // Confetti Function for the finale
        function shootConfetti() {
            var duration = 3 * 1000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

            function randomInRange(min, max) {
                return Math.random() * (max - min) + min;
            }

            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) { return clearInterval(interval); }
                var particleCount = 50 * (timeLeft / duration);
                
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
            }, 250);
        }
    </script>
